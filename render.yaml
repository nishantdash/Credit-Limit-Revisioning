services:
  - type: web
    name: clr-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    # Seed (drop_all + reseed — idempotent) on every boot, then serve on Render's $PORT.
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Set this to your Vercel URL after the frontend deploys (e.g. https://clr.vercel.app).
      # *.vercel.app is already allowed by regex; this is for a custom domain if you add one.
      - key: CORS_ORIGINS
        sync: false
